name: MLOps CI/CD Pipeline

# 1. Trigger the workflow when code is pushed

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 2. Define the jobs to run

jobs:
  build-and-test:
    # Spin up a fresh Linux server hosted by GitHub
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download your code into the server
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Step 2: Install Python (Fixed the @@ typo here!)
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # Step 3: Install required libraries
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas numpy scikit-learn

    # Step 4: Run the Unit Tests we wrote
    - name: Run MLOps Unit Tests
      run: |
        pytest test_mlops.py
